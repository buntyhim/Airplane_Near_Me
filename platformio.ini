[env:m5stick-cplus2]
platform = espressif32@6.5.0
board = esp32dev
framework = arduino
upload_port = COM5
monitor_port = COM5

; Fixed hardware settings
monitor_speed = 115200
board_build.mcu = esp32
board_build.f_cpu = 240000000L

lib_deps =
    m5stack/M5StickCPlus2@1.0.2
    bblanchon/ArduinoJson@^7.0.4
; FIX: This line tells PlatformIO to skip the broken DFRobot library
lib_ignore = DFRobot_GP8XXX

; Use 'chain' mode to prevent unnecessary library searches
lib_ldf_mode = chain